<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tecur Automobile</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      // Instead of 'importing', we fetch the text and translate it manually
      async function launchApp() {
        try {
          const response = await fetch('./App.jsx');
          const rawCode = await response.text();
          
          // Translate JSX to JavaScript
          const translatedCode = Babel.transform(rawCode, { 
            presets: ['react'] 
          }).code;

          // Create a script tag to run the translated code
          const script = document.createElement('script');
          script.type = 'module';
          script.text = translatedCode;
          document.head.appendChild(script);
        } catch (err) {
          console.error("Launch error:", err);
        }
      }

      launchApp();
    </script>
  </body>
</html>
